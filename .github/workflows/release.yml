name: Release

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    tags:
      - 'v*.*.*'
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: Test · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./... -v

  build:
    name: Build · ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"

          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -trimpath \
            -o "jetreset-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/jetreset

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetreset-${{ matrix.goos }}-${{ matrix.goarch }}
          path: jetreset-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
